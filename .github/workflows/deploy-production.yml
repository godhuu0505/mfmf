name: Deploy Production

# main にマージ（push）されたら、CI 緑を確認したうえで
# Supabase migration を本番に適用し、Vercel の Production 環境へデプロイする。
# 「merge = 本番リリース」。Release 公開ゲートは設けない。
on:
  push:
    branches: [main]

# 本番デプロイは取りこぼしたくないので途中キャンセルしない。
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # まず CI（lint / typecheck / build）を再利用して緑を確認する。
  verify:
    uses: ./.github/workflows/ci.yml

  # Vercel / Supabase のシークレットが設定されているかを確認する。
  # 未設定の環境ではジョブを skip させ、ワークフロー全体が赤くならないようにする。
  # secrets コンテキストは job-level の if では参照できないので、専用ジョブで output 化する。
  # environment 指定が必須: Environment scoped secrets を読むため
  # （これがないと Repository scope の secret しか見えず、Environment 登録分が「未設定」と誤判定される）。
  check-secrets:
    name: Check deploy secrets
    runs-on: ubuntu-latest
    environment:
      name: production
    outputs:
      has_vercel: ${{ steps.check.outputs.has_vercel }}
      has_supabase: ${{ steps.check.outputs.has_supabase }}
    steps:
      - id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "has_vercel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN が未設定のため Vercel Production デプロイをスキップします。"
          fi
          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "has_supabase=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_supabase=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_ACCESS_TOKEN が未設定のため Supabase migrate をスキップします。"
          fi

  # supabase/migrations/ の未適用分を本番 Supabase に push する。
  # main マージ時点でスキーマを進めてから、続く Vercel Production deploy が新スキーマ前提で動作できるようにする。
  # `supabase db push` は schema_migrations を見て冪等に動作する。
  migrate:
    name: Supabase migrate
    needs: [verify, check-secrets]
    if: needs.check-secrets.outputs.has_supabase == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # migrate 前に本番 DB をダンプして Artifact に上げる。
      # Free プランには自動バックアップ / PITR が無いため、これが唯一のロールバック資産。
      # 90 日保持。復元手順は docs/guides/deploy.md を参照。
      - name: Backup remote DB (schema)
        run: supabase db dump --linked --schema public -f pre-migrate-schema.sql

      - name: Backup remote DB (data)
        run: supabase db dump --linked --schema public --data-only -f pre-migrate-data.sql

      - uses: actions/upload-artifact@v4
        with:
          # commit SHA を入れて「どの main マージ直前の DB か」を Artifact 一覧から判別できるようにする。
          name: supabase-backup-production-${{ github.sha }}
          path: |
            pre-migrate-schema.sql
            pre-migrate-data.sql
          retention-days: 90
          if-no-files-found: error

      - name: Apply migrations
        run: supabase db push

  deploy:
    name: Vercel Production
    needs: [verify, check-secrets, migrate]
    # migrate が skip された場合（Supabase secrets 未設定）でも deploy は続行する。
    # 既定の success() は skipped を許容しないため明示的に書く。!cancelled() でキャンセル時は走らせない。
    if: |
      !cancelled() &&
      needs.verify.result == 'success' &&
      needs.check-secrets.outputs.has_vercel == 'true' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    # GitHub Environment。承認ルールを付ければ本番への誤発射を防げる。
    environment:
      name: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Vercel プロジェクト設定と Production 用環境変数を取得する。
      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # 本番ビルド（.vercel/output を生成）。
      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # ビルド済み成果物だけをアップロードして Production デプロイする。
      - name: Deploy prebuilt to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
