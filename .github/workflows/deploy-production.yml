name: Deploy Production

# main に入っている commit にタグを付け、その Release を公開（=Release Note 作成）したら
# Vercel の Production 環境へデプロイする。
on:
  release:
    types: [published]

# 本番デプロイは取りこぼしたくないので途中キャンセルしない。
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # まず CI（lint / typecheck / build）を再利用して緑を確認する。
  verify:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Vercel Production
    needs: verify
    runs-on: ubuntu-latest
    # GitHub Environment。承認ルールを付ければ本番への誤発射を防げる。
    environment:
      name: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      # Release のタグを明示的にチェックアウトする（タグ時点のコードを本番に出す）。
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Vercel プロジェクト設定と Production 用環境変数を取得する。
      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # 本番ビルド（.vercel/output を生成）。
      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # ビルド済み成果物だけをアップロードして Production デプロイする。
      - name: Deploy prebuilt to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
