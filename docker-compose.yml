services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      SUPABASE_INTERNAL_URL: http://host.docker.internal:54321
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  node_modules:
